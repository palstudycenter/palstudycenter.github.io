<!DOCTYPE html>
<html lang="hi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Hero Slideshow</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
  overflow:hidden;
}

/* SLIDES */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1.2s ease-in-out;
  filter:brightness(0.55);
}

.slide.active{
  opacity:1;
}

/* OVERLAY TEXT */
.content{
  position:relative;
  z-index:2;
  max-width:900px;
  padding:20px;
}

h1{
  font-size:clamp(28px,5vw,60px);
  font-weight:800;
}

p{
  font-size:clamp(14px,2vw,18px);
  margin-top:10px;
  color:#e5e7eb;
}

/* BUTTON */
.btn{
  margin-top:20px;
  display:inline-block;
  padding:12px 25px;
  background:#2563eb;
  color:white;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
}

</style>
</head>

<body>

<div class="hero">

  <!-- SLIDES (5 Coaching Photos) -->
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1577896851231-70ef18881754')"></div>

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655')"></div>

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1509062522246-3755977927d7')"></div>

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1523240797600-3ac56e9f4c6c')"></div>

  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1588072432836-e10032774350')"></div>

  <!-- CONTENT -->
  <div class="content">
    <h1>पाल स्टडी सेंटर</h1>
    <p>Teacher • Students • Smart Coaching Classes for Better Future</p>
    <a href="#" class="btn">Apply Now</a>
  </div>

</div>

<script>

let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {

  slides[index].classList.remove("active");

  index = (index + 1) % slides.length;

  slides[index].classList.add("active");

}, 3500);

</script>

</body>
</html>
