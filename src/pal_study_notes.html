<style>

body{
  background:#f4f7fb;
  font-family:Arial,sans-serif;
}

.site-logo{
  text-align:center;
  font-size:42px;
  font-weight:800;
  margin-bottom:30px;
  color:#222;
}

.top-bar{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.back-btn{
  border:none;
  background:#111;
  color:white;
  padding:10px 18px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.section-title{
  flex:1;
  color:white;
  padding:15px;
  border-radius:15px;
  font-size:24px;
  font-weight:bold;
  text-align:center;
  background:linear-gradient(135deg,#396afc,#2948ff,#00c6ff);
}

.grid-box{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.main-btn{
  border:none;
  padding:20px;
  border-radius:18px;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  width:100%;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
}

.main-btn:hover{
  transform:translateY(-5px);
}

.page{ display:none; }

</style>

/* ================= CODE ================= */

let currentBoard = "";
let currentClass = "";
let currentSubject = "";

function initBoards(){
  const box = document.getElementById("boardBox");
  Object.keys(data).forEach(board=>{
    box.appendChild(createBtn(board,"#ff512f",()=>{
      currentBoard = board;
      loadClasses();
      showPage("classPage");
    }));
  });
}

function loadClasses(){
  const box = document.getElementById("classBox");
  box.innerHTML = "";
  Object.keys(data[currentBoard]).forEach(cls=>{
    box.appendChild(createBtn(cls,"#11998e",()=>{
      currentClass = cls;
      loadSubjects();
      showPage("subjectPage");
    }));
  });
}

function loadSubjects(){
  const box = document.getElementById("subjectBox");
  box.innerHTML = "";
  const subjects = Object.keys(data[currentBoard][currentClass]);
  subjects.forEach(sub=>{
    box.appendChild(createBtn(sub,"#396afc",()=>{
      currentSubject = sub;
      loadUnits();
      showPage("unitPage");
    }));
  });
}

function loadUnits(){
  const box = document.getElementById("unitBox");
  box.innerHTML = "";

  const units = data[currentBoard]?.[currentClass]?.[currentSubject] || [];

  if(units.length === 0){
    box.innerHTML = "<p>No Units Available</p>";
    return;
  }

  units.forEach(u=>{
    box.appendChild(createBtn(u,"#6a11cb",()=>{

      alert("Access Restricted: यह स्टडी नोट्स केवल PAL Study Center के नामांकित विद्यार्थियों के लिए उपलब्ध हैं।");

    }));
  });
}

function createBtn(text,color,fn){
  const b = document.createElement("button");
  b.className = "main-btn";
  b.innerText = text;
  b.style.background = "linear-gradient(135deg,"+color+",#2575fc)";
  b.onclick = fn;
  return b;
}

function showPage(page){
  document.querySelectorAll("#boardPage,#classPage,#subjectPage,#unitPage")
  .forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

function goBack(show,hide){
  document.getElementById(hide).style.display="none";
  document.getElementById(show).style.display="block";
}

showPage("boardPage");
initBoards();
