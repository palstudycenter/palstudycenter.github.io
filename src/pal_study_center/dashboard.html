 
<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pal Study Center ERP Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(135deg,#eff6ff,#dbeafe,#f8fafc);

overflow-x:hidden;

}

/* =========================
NAVBAR
========================= */

.navbar{

background:rgba(15,23,42,.70);

backdrop-filter:blur(12px);

padding:12px 0;

box-shadow:0 4px 18px rgba(0,0,0,.15);

}

.navbar-brand{

font-size:28px;

font-weight:700;

color:white !important;

}

.navbar-brand span{
color:#60a5fa;
}

.navbar-toggler{

background:white;

border:none;

}

.nav-link{

color:white !important;

font-weight:500;

margin-left:10px;

padding:10px 16px !important;

border-radius:12px;

transition:.3s;

}

.nav-link:hover{

background:rgba(255,255,255,.12);

color:#60a5fa !important;

transform:translateY(-2px);

}

/* =========================
HERO
========================= */

.hero{

padding:110px 20px 40px;

text-align:center;

}

.hero h1{

font-size:46px;

font-weight:700;

color:#0f172a;

}

.hero p{

font-size:18px;

color:#475569;

margin-top:10px;

}

/* =========================
MAIN
========================= */

.main{

padding:20px;

max-width:1200px;

margin:auto;

}

/* =========================
GLASS CARD
========================= */

.glass{

background:rgba(255,255,255,.65);

backdrop-filter:blur(12px);

border-radius:28px;

padding:25px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

animation:fade .4s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =========================
CLASS GRID
========================= */

.class-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

margin-top:25px;

}

.class-btn{

border:none;

padding:24px;

border-radius:22px;

background:
linear-gradient(135deg,#2563eb,#60a5fa);

color:white;

font-size:18px;

font-weight:600;

transition:.3s;

box-shadow:0 10px 22px rgba(37,99,235,.25);

}

.class-btn:hover{

transform:translateY(-6px) scale(1.03);

}

/* =========================
SUBJECT CARD
========================= */

.subject-card{

background:#f8fafc;

padding:18px;

border-radius:18px;

margin-bottom:14px;

display:flex;

justify-content:space-between;

align-items:center;

transition:.3s;

}

.subject-card:hover{

background:#eff6ff;

transform:translateX(5px);

}

.toggle-btn{

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:600;

color:white;

}

.enable{
background:#16a34a;
}

.disable{
background:#dc2626;
}

/* =========================
STUDENT LIST
========================= */

.student-card{

background:#f8fafc;

padding:18px;

border-radius:18px;

margin-bottom:12px;

cursor:pointer;

transition:.3s;

font-weight:600;

}

.student-card:hover{

background:#2563eb;

color:white;

transform:translateX(5px);

}

/* =========================
PROFILE
========================= */

.profile{

background:#f8fafc;

padding:25px;

border-radius:24px;

}

.month-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(120px,1fr));

gap:12px;

margin-top:20px;

}

.month-card{

background:white;

padding:12px;

border-radius:14px;

box-shadow:0 4px 10px rgba(0,0,0,.05);

}

.month-card select{

width:100%;

padding:8px;

margin-top:8px;

border-radius:10px;

border:1px solid #cbd5e1;

}

/* =========================
ACCESS BOX
========================= */

.access{

padding:16px;

border-radius:16px;

font-weight:600;

margin:20px 0;

text-align:center;

}

.green{

background:#dcfce7;

color:#166534;

}

.red{

background:#fee2e2;

color:#991b1b;

}

/* =========================
BACK BTN
========================= */

.back-btn{

border:none;

padding:12px 22px;

border-radius:14px;

background:#2563eb;

color:white;

font-weight:600;

margin-top:20px;

}

/* =========================
HIDE
========================= */

.hidden{
display:none;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

.hero h1{
font-size:34px;
}

.hero p{
font-size:15px;
}

.class-btn{
font-size:16px;
padding:18px;
}

}

</style>

</head>

<body>

<!-- =========================
NAVBAR
========================= -->

<nav class="navbar navbar-expand-lg fixed-top">

<div class="container">

<a class="navbar-brand" href="#">
पाल <span>ERP</span>
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navMenu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link"
href="#"
onclick="showDashboard()">

<i class="bi bi-grid-fill"></i>
Dashboard

</a>
</li>

<li class="nav-item">
<a class="nav-link"
href="#"
onclick="showClasses()">

<i class="bi bi-book-fill"></i>
Classes

</a>
</li>

<li class="nav-item">
<a class="nav-link"
href="#"
onclick="showStudentsSection()">

<i class="bi bi-people-fill"></i>
Students

</a>
</li>

<li class="nav-item">
<a class="nav-link"
href="#">

<i class="bi bi-box-arrow-right"></i>
Logout

</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- =========================
HERO
========================= -->

<section class="hero">

<h1>
📚 Pal Study Center ERP
</h1>

<p>
Professional Coaching Management Dashboard
</p>

</section>

<!-- =========================
MAIN
========================= -->

<div class="main">

<!-- =========================
DASHBOARD
========================= -->

<div id="dashboardSection" class="glass">

<h2>
Welcome Admin 👨‍🏫
</h2>

<br>

<p>
यहाँ से आप Classes, Students, Notes Access और Fees System manage कर सकते हैं।
</p>

</div>

<!-- =========================
CLASSES
========================= -->

<div id="classesSection" class="glass hidden">

<h2>
📘 Class Control
</h2>

<div class="class-grid">

<button class="class-btn"
onclick="openClass('Class 12th')">

Class 12th

</button>

<button class="class-btn"
onclick="openClass('Class 11th')">

Class 11th

</button>

<button class="class-btn"
onclick="openClass('Class 10th')">

Class 10th

</button>

<button class="class-btn"
onclick="openClass('Class 9th')">

Class 9th

</button>

</div>

<br>

<div id="subjectsArea"></div>

</div>

<!-- =========================
STUDENTS
========================= -->

<div id="studentsSection" class="glass hidden">

<h2>
👨‍🎓 Students List
</h2>

<br>

<div id="studentList"></div>

</div>

<!-- =========================
PROFILE
========================= -->

<div id="profileSection"
class="glass hidden">

<div id="profileContent"></div>

</div>

</div>

<script>

/* =========================
SUBJECTS
========================= */

let subjects = {
"Class 12th":["Physics","Chemistry","Mathematics","Biology","English","Hindi"],
"Class 11th":["Physics","Chemistry","Mathematics","Biology","English","Hindi"],
"Class 10th":["Science","Social Science","Mathematics","English","Hindi"],
"Class 9th":["Science","Social Science","Mathematics","English","Hindi"]
};

/* =========================
SUBJECT CONTROL
========================= */

let enabled = JSON.parse(localStorage.getItem("enabled")) || {};

/* =========================
STUDENTS
========================= */

let students = JSON.parse(localStorage.getItem("users")) || [];
students.forEach(s=>{

if(s.studentAccess === undefined){
s.studentAccess = true;
}

});
/* =========================
UTIL: CHECK ACCESS
========================= */

function hasAccess(student){

return student.access !== false;

}
/* =========================
UI CONTROL
========================= */

function hideAll(){
dashboardSection.classList.add("hidden");
classesSection.classList.add("hidden");
studentsSection.classList.add("hidden");
profileSection.classList.add("hidden");
}

function showDashboard(){
hideAll();
dashboardSection.classList.remove("hidden");
}

function showClasses(){
hideAll();
classesSection.classList.remove("hidden");
}

function showStudentsSection(){
hideAll();
studentsSection.classList.remove("hidden");
loadStudents();
}

/* =========================
CLASS CONTROL
========================= */

function openClass(cls){

let html = `<h3>${cls}</h3><br>`;

subjects[cls].forEach(sub=>{

let key = cls + "_" + sub;

if(enabled[key] === undefined){
enabled[key] = true;
}

html += `
<div class="subject-card">
<div>${sub}</div>

<button class="toggle-btn ${enabled[key] ? 'enable':'disable'}"
onclick="toggleSubject('${cls}','${sub}')">

${enabled[key] ? 'Enabled' : 'Disabled'}

</button>
</div>
`;
});

html += `<button class="back-btn" onclick="showClasses()">⬅ Back</button>`;

subjectsArea.innerHTML = html;
localStorage.setItem("enabled", JSON.stringify(enabled));
}

function toggleSubject(cls,sub){

let key = cls + "_" + sub;
enabled[key] = !enabled[key];

localStorage.setItem("enabled", JSON.stringify(enabled));
openClass(cls);
}

/* =========================
STUDENTS LIST
========================= */

function loadStudents(){

let html = "";

// सिर्फ class buttons (Class Control जैसा)
for(let cls in subjects){

html += `
<div class="class-grid" style="margin-bottom:10px;">
<button class="class-btn" onclick="openStudentClass('${cls}')">
📘 ${cls}
</button>
</div>
`;

}

studentList.innerHTML = html;
}
function openStudentClass(cls){

let html = `<h3>📘 ${cls}</h3><br>`;

// original students filter (NO CHANGE IN DATA)
students.forEach((s,index)=>{

if(s.class.toLowerCase() === cls.toLowerCase()){

html += `
<div class="student-card" onclick="openProfile(${index})">
👨‍🎓 ${s.name}<br>
<small>${s.phone}</small>
</div>
`;

}

});

html += `<br><button class="back-btn" onclick="loadStudents()">⬅ Back</button>`;

studentList.innerHTML = html;
}

/* =========================
PROFILE (MAIN LOGIC FIX)
========================= */

function openProfile(index){

hideAll();
profileSection.classList.remove("hidden");

let s = students[index];

if(!s.fees){
s.fees = {
April:"Paid",
May:"Paid",
June:"Paid",
July:"Paid"
};
}

let access = hasAccess(s);

// Fee UI
let feeHTML = "";

for(let m in s.fees){

feeHTML += `
<div class="month-card">
<b>${m}</b>

<select onchange="changeFee(${index},'${m}',this.value)">
<option ${s.fees[m]=='Paid'?'selected':''}>Paid</option>
<option ${s.fees[m]=='Unpaid'?'selected':''}>Unpaid</option>
<option ${s.fees[m]=='Leave'?'selected':''}>Leave</option>
</select>
</div>
`;
}

// SUBJECTS
let subjectHTML = "";

if(access){

let cls = s.class.toLowerCase();

for(let key in subjects){

if(key.toLowerCase() === cls){

subjects[key].forEach(sub=>{

let k = key + "_" + sub;

if(enabled[k] !== false){

subjectHTML += `
<div class="subject-card">
<div>📘 ${sub}</div>
</div>
`;

}

});

}

}

}

profileContent.innerHTML = `
<div class="profile">

<h2>${s.name}</h2>

<p>📚 ${s.class}</p>

<p>📞 ${s.phone}</p>
<div style="margin-top:15px;">

<button class="toggle-btn ${s.access !== false ? 'enable':'disable'}"
onclick="toggleStudentAccess(${index})">

${s.access !== false ? 'Access Enabled' : 'Access Disabled'}

</button>

</div>

<div class="access ${access ? 'green':'red'}">
${access ? '✅ Notes Access Enabled' : '❌ Study Material Access Disabled'}
</div>

<h4 style="margin-top:20px;">💰 Monthly Fee Record</h4>

<div class="month-grid">${feeHTML}</div>

<h4 style="margin-top:20px;">📘 Subjects</h4>

${access ? subjectHTML : '<div class="access red">Subjects Disabled</div>'}

<button class="back-btn" onclick="showStudentsSection()">
⬅ Back
</button>

</div>
`;
}

function toggleStudentAccess(index){

if(students[index].access === undefined){
students[index].access = true;
}

students[index].access = !students[index].access;

localStorage.setItem("users", JSON.stringify(students));

openProfile(index);
}
/* =========================
CHANGE FEE
========================= */

function changeFee(index,month,value){
students[index].fees[month] = value;
openProfile(index);
}

function toggleStudentAccess(index){

students[index].access = !students[index].access;

localStorage.setItem("users", JSON.stringify(students));

openProfile(index);
}

/* init */
showDashboard();
/* init */
showDashboard();

</script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
