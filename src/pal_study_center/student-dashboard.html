<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pal ERP Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ================= RESET (ONLY SCROLL FIX ADDED) ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Poppins,system-ui;
background:#f4f7fb;

/* ✅ FIX SCROLL ISSUE */
overflow-x:hidden;
overflow-y:auto !important;

/* navbar overlap fix */
padding-top:90px;
}

/* ================= NAVBAR (UNCHANGED) ================= */
.navbar{
background:rgba(15,23,42,0.35);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,0.08);
padding:14px 0;
z-index:1000;
}

.navbar-brand{
font-size:26px;
font-weight:700;
color:white !important;
}

.navbar-brand span{
color:#60a5fa;
}

.nav-link{
color:white !important;
font-weight:500;
margin-left:10px;
padding:8px 14px;
border-radius:20px;
transition:.3s;
}

.nav-link:hover{
background:rgba(255,255,255,0.15);
}

/* ================= HERO ================= */
.hero{
background:linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('assets/img/classroom-bg.jpg');
background-size:cover;
background-position:center;
padding:140px 20px 60px;
text-align:center;
color:white;
}

.profile-pic{
width:95px;
height:95px;
border-radius:50%;
border:3px solid #60a5fa;
cursor:pointer;
object-fit:cover;
}

/* ================= SUBJECTS ================= */
.section{
padding:50px 20px;
}

.subject-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.subject{
padding:18px;
border-radius:16px;
color:white;
font-weight:600;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
transition:.3s;
}

.subject:hover{
transform:scale(1.04);
}

/* COLORS */
.c1{background:linear-gradient(135deg,#2563eb,#60a5fa);}
.c2{background:linear-gradient(135deg,#16a34a,#4ade80);}
.c3{background:linear-gradient(135deg,#f97316,#fb923c);}
.c4{background:linear-gradient(135deg,#ef4444,#f87171);}
.c5{background:linear-gradient(135deg,#8b5cf6,#a78bfa);}
.c6{background:linear-gradient(135deg,#0ea5e9,#38bdf8);}

/* ================= MODALS ================= */
.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
z-index:9999;
}

.modalBox{
width:100%;
height:100%;
background:white;
padding:20px;
overflow:auto;
}

.closeBtn{
position:fixed;
top:15px;
right:15px;
background:red;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
z-index:10000;
}

.item{
padding:12px;
margin:10px 0;
border-radius:10px;
background:#f8fafc;
font-weight:600;
}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg fixed-top">

<div class="container">

<a class="navbar-brand">पाल <span>ERP</span></a>

<button class="navbar-toggler ms-auto" type="button"
data-bs-toggle="collapse" data-bs-target="#nav">

<i class="bi bi-list" style="font-size:30px;color:white;"></i>

</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto">

<li><a class="nav-link" href="#">Home</a></li>
<li><a class="nav-link" onclick="openTest()">Student Test</a></li>
<li><a class="nav-link" onclick="openNotice()">Notice Board</a></li>
<li><a class="nav-link" onclick="openFees()">Fees</a></li>

</ul>

</div>

</div>

</nav>

<!-- ================= HERO ================= -->
<section class="hero">

<img id="photo"
class="profile-pic"
onclick="uploadPhoto()"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h2 id="name"></h2>
<p id="class"></p>

<div>Learn • Grow • Succeed</div>

</section>

<!-- ================= SUBJECTS ================= -->
<section class="section">

<div class="container">

<h3>📘 Subjects</h3>

<div id="subjects" class="subject-grid"></div>

</div>

</section>

<!-- ================= TEST ================= -->
<div class="overlay" id="testBox">
<div class="modalBox">

<button class="closeBtn" onclick="closeTest()">Close</button>

<h2>🧪 Student Test</h2>
<div id="testList"></div>

</div>
</div>

<!-- ================= NOTICE ================= -->
<div class="overlay" id="noticeBox">
<div class="modalBox">

<button class="closeBtn" onclick="closeNotice()">Close</button>

<h2>📢 Notice Board</h2>
<div id="noticeList"></div>

</div>
</div>

<!-- ================= FEES ================= -->
<div class="overlay" id="feeBox">
<div class="modalBox">

<button class="closeBtn" onclick="closeFees()">Close</button>

<h2>💰 Monthly Fees</h2>
<div id="feeList"></div>

</div>
</div>

<script>

/* STUDENT */
let student = JSON.parse(localStorage.getItem("currentUser")) || {
name:"Student",
class:"Class 12th",
phone:"0"
};

let users = JSON.parse(localStorage.getItem("users")) || [];

let real = users.find(u=>u.phone===student.phone) || student;

/* UI */
document.getElementById("name").innerText = real.name;
document.getElementById("class").innerText = real.class;

/* PHOTO */
function uploadPhoto(){
let input=document.createElement("input");
input.type="file";

input.onchange=(e)=>{
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=()=>{
document.getElementById("photo").src=reader.result;
localStorage.setItem("photo_"+real.phone,reader.result);
};

reader.readAsDataURL(file);
};

input.click();
}

let saved=localStorage.getItem("photo_"+real.phone);
if(saved){
document.getElementById("photo").src=saved;
}

/* SUBJECTS */
let subjects={
"Class 12th":["Physics","Chemistry","Maths","Biology"],
"Class 11th":["Physics","Chemistry","Maths"],
"Class 10th":["Science","Maths","Social"]
};

let colors=["c1","c2","c3","c4","c5","c6"];

let html="";
(subjects[real.class]||[]).forEach((s,i)=>{
html+=`<div class="subject ${colors[i%colors.length]}">${s}</div>`;
});

document.getElementById("subjects").innerHTML=html;

/* TEST */
function openTest(){
let data=JSON.parse(localStorage.getItem("tests"))||{};
let list=data[real.class]||["No Tests"];
document.getElementById("testList").innerHTML=list.map(i=>`<div class="item">${i}</div>`).join("");
document.getElementById("testBox").style.display="block";
}
function closeTest(){document.getElementById("testBox").style.display="none";}

/* NOTICE */
function openNotice(){
let data=JSON.parse(localStorage.getItem("notices"))||{};
let list=data[real.class]||["No Notice"];
document.getElementById("noticeList").innerHTML=list.map(i=>`<div class="item">${i}</div>`).join("");
document.getElementById("noticeBox").style.display="block";
}
function closeNotice(){document.getElementById("noticeBox").style.display="none";}

/* FEES */
function openFees(){
let data=JSON.parse(localStorage.getItem("fees"))||{};
let list=data[real.phone]||{April:"Paid",May:"Paid"};
let html="";
for(let m in list){
html+=`<div class="item">${m} - ${list[m]}</div>`;
}
document.getElementById("feeList").innerHTML=html;
document.getElementById("feeBox").style.display="block";
}
function closeFees(){document.getElementById("feeBox").style.display="none";}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
