<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,Arial,sans-serif;background:#f4f7fb}
.navbar{background:rgba(15,23,42,.8);backdrop-filter:blur(10px)}
.hero{
min-height:60vh;color:#fff;text-align:center;
background:linear-gradient(rgba(15,23,42,.6),rgba(15,23,42,.6)),
url(https://images.unsplash.com/photo-1516321318423-f06f85e504b3);
background-size:cover;background-position:center;
padding:110px 15px 40px;
}
.profile{width:110px;height:110px;border-radius:50%;border:3px solid #fff;object-fit:cover}
.upload-btn{background:#2563eb;color:#fff;padding:8px 16px;border-radius:25px;display:inline-block;cursor:pointer;margin-top:10px}
.hero-marquee{overflow:hidden;white-space:nowrap;margin-top:20px}
.hero-marquee span{display:inline-block;background:rgba(255,255,255,.15);padding:10px 20px;border-radius:25px;animation:scroll 10s linear infinite}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.section-title{text-align:center;padding:50px 0 20px}
.subject-card{border-radius:20px;min-height:140px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-decoration:none;box-shadow:0 8px 22px rgba(0,0,0,.12);transition:.3s}
.subject-card:hover{transform:translateY(-6px)}
.subject-card i{font-size:32px;margin-bottom:10px}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand" href="#">
    <span style="font-size:40px;font-weight:700;">पाल स्टडी सेंटर  </span>
    <span style="font-size:32px;font-weight:700;color:#2874f0;"> ERP</span>

</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Test Record</a></li>
<li class="nav-item"><a class="nav-link" href="#">Fees Record</a></li>
<li class="nav-item"><a class="nav-link" href="#">Notice</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero">

<div style="display:flex;justify-content:center;align-items:center;flex-direction:column;">

  <div onclick="document.querySelector('#file').click()"
       style="
       width:110px;
       height:110px;
       border-radius:50%;
       padding:4px;
       background:linear-gradient(135deg,#60a5fa,#8b5cf6);
       box-shadow:0 10px 25px rgba(0,0,0,0.25);
       cursor:pointer;
       transition:0.3s;
       ">

    <img id="profileImg"
      src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
      style="
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
        border:3px solid rgba(255,255,255,0.9);
      ">

  </div>

  <input id="file" type="file" hidden accept="image/*" onchange="loadImage(event)">

</div>
<h3 id="studentName"></h3>
<p id="studentInfo"></p>

<div class="hero-marquee">
<span>📢Your Dashboard is active | 📚 All academic modules are enabled | 🎓 Wishing you a productive learning experience</span>
</div>
</section>

<section class="container pb-5">
<div class="section-title">
<h2>Quick Subjects</h2>
<p>सभी विषय यहाँ उपलब्ध हैं</p>
</div>

<div class="row g-4" id="subjectsContainer"></div>
</section>

<script>
function loadImage(event){
    document.getElementById('profileImg').src=URL.createObjectURL(event.target.files[0]);
}
</script>
<script src="../../config.js"></script>
<script src="student-dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
