<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Pal Study Center</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    font-family:'Poppins',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f8fafc;
    padding:20px;
    position:relative;
}

/* Glow Effects */

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(37,99,235,.12);
    border-radius:50%;
    filter:blur(120px);
    top:-120px;
    left:-120px;
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(14,165,233,.10);
    border-radius:50%;
    filter:blur(120px);
    bottom:-120px;
    right:-120px;
}

/* Container */

.container-box{
    width:100%;
    max-width:450px;
    position:relative;
    z-index:2;
}

/* Card */

.card-box{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.9);
    border-radius:30px;
    padding:40px 30px;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
}

/* Logo */

.logo{
    text-align:center;
    margin-bottom:25px;
}

.page-logo{
    width:100%;
    max-width:300px;
    display:block;
    margin:0 auto 15px;
}

.logo h1{
    font-size:28px;
    font-weight:700;
    color:#1e293b;
}

.logo p{
    color:#64748b;
    font-size:14px;
    margin-top:8px;
}

/* Input */

.form-control{
    height:55px;
    border-radius:16px;
    border:1px solid #cbd5e1;
    background:#fff;
    color:#1e293b;
    font-size:15px;
}

.form-control::placeholder{
    color:#64748b;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

/* Button */

.btn-reset{
    width:100%;
    height:55px;
    border:none;
    border-radius:16px;
    margin-top:18px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:16px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 8px 22px rgba(37,99,235,.25);
}

.btn-reset:hover{
    transform:translateY(-2px);
}

/* Result */

.result{
    margin-top:20px;
    padding:14px;
    border-radius:14px;
    background:#eff6ff;
    border:1px solid #bfdbfe;
    color:#1e293b;
    display:none;
    text-align:center;
    font-size:14px;
}

/* Back Link */

.back{
    text-align:center;
    margin-top:18px;
}

.back a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.back a:hover{
    text-decoration:underline;
}

@media(max-width:576px){

    .card-box{
        padding:30px 22px;
    }

    .page-logo{
        max-width:250px;
    }

}

</style>

</head>

<body>

<div class="container-box">

<div class="card-box">

<div class="logo">

<img
src="../../assets/img/main_logo.png"
alt="Pal Study Center"
class="page-logo">

<h1>Forgot Password</h1>

<p>Recover Your Account Password</p>

</div>

<input
type="tel"
id="phone"
class="form-control"
placeholder="Enter Registered Mobile Number">

<button
class="btn-reset"
onclick="recoverPassword()">

<i class="bi bi-search"></i>
 Verify Mobile

</button>

<div
class="result"
id="resultBox">
</div>

<input
type="password"
id="newPassword"
class="form-control mt-3"
placeholder="Enter New Password"
style="display:none;">

<input
type="password"
id="confirmPassword"
class="form-control mt-3"
placeholder="Confirm New Password"
style="display:none;">

<button
id="resetBtn"
class="btn-reset"
onclick="resetPassword()"
style="display:none;">

<i class="bi bi-shield-lock"></i>
 Reset Password

</button>

<div class="back">

<a href="login.html">

<i class="bi bi-arrow-left"></i>
 Back To Login

</a>

</div>

</div>

</div>

<script>

let currentUser = null;

function recoverPassword(){

let phone =
document.getElementById("phone").value.trim();

let resultBox =
document.getElementById("resultBox");

let users =
JSON.parse(localStorage.getItem("users")) || [];

let user =
users.find(u => u.phone === phone);

resultBox.style.display = "block";

if(phone === ""){

resultBox.innerHTML =
"Please Enter Mobile Number";

return;

}

if(user){

currentUser = user;

resultBox.innerHTML =
"Mobile Number Verified Successfully";

document.getElementById("newPassword").style.display = "block";

document.getElementById("confirmPassword").style.display = "block";

document.getElementById("resetBtn").style.display = "block";

}else{

resultBox.innerHTML =
"Mobile Number Not Found";

}

}

function resetPassword(){

let newPassword =
document.getElementById("newPassword").value.trim();

let confirmPassword =
document.getElementById("confirmPassword").value.trim();

let resultBox =
document.getElementById("resultBox");

if(newPassword === ""){

resultBox.innerHTML =
"Please Enter New Password";

return;

}

if(newPassword !== confirmPassword){

resultBox.innerHTML =
"Passwords Do Not Match";

return;

}

let users =
JSON.parse(localStorage.getItem("users")) || [];

let index =
users.findIndex(u => u.phone === currentUser.phone);

if(index !== -1){

users[index].password = newPassword;

localStorage.setItem(
"users",
JSON.stringify(users)
);

resultBox.innerHTML =
"Password Changed Successfully";

}

}

</script>

</body>

</html>
