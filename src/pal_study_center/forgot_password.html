<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Pal Study Center</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(rgba(15,23,42,.82),rgba(15,23,42,.82)),
url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1400');

background-size:cover;

background-position:center;

overflow:hidden;

}

/* CARD */

.container-box{

width:100%;
max-width:420px;
padding:20px;

}

.card-box{

background:rgba(255,255,255,0.10);

backdrop-filter:blur(15px);

border-radius:28px;

padding:40px 30px;

border:1px solid rgba(255,255,255,0.12);

box-shadow:0 10px 35px rgba(0,0,0,.35);

color:white;

}

/* LOGO */

.logo{

text-align:center;

margin-bottom:25px;

}

.logo i{

font-size:45px;

color:#60a5fa;

margin-bottom:10px;

}

.logo h1{

font-size:30px;

font-weight:700;

}

.logo p{

font-size:14px;

color:#cbd5e1;

}

/* INPUT */

.form-control{

height:55px;

border:none;

border-radius:16px;

background:rgba(255,255,255,.10);

color:white;

padding-left:15px;

font-size:15px;

}

.form-control::placeholder{

color:#cbd5e1;

}

.form-control:focus{

background:rgba(255,255,255,.16);

color:white;

box-shadow:0 0 0 4px rgba(96,165,250,.25);

}

/* BUTTON */

.btn-reset{

width:100%;

height:55px;

border:none;

border-radius:16px;

margin-top:18px;

background:linear-gradient(135deg,#2563eb,#7c3aed);

color:white;

font-size:16px;

font-weight:600;

transition:.3s;

}

.btn-reset:hover{

transform:translateY(-2px);

}

/* RESULT */

.result{

margin-top:20px;

padding:14px;

border-radius:14px;

background:rgba(255,255,255,.08);

display:none;

text-align:center;

font-size:14px;

}

/* LINK */

.back{

text-align:center;

margin-top:18px;

}

.back a{

color:#dbeafe;

text-decoration:none;

}

/* FOOTER */

.footer{

text-align:center;

margin-top:25px;

font-size:13px;

color:#cbd5e1;

}

</style>

</head>

<body>

<div class="container-box">

<div class="card-box">

<!-- LOGO -->

<div class="logo">

<i class="bi bi-key-fill"></i>

<h1>Forgot Password</h1>

<p>
Recover Your Account Password
</p>

</div>

<!-- INPUT -->

<input
type="tel"
id="phone"
class="form-control"
placeholder="Enter Registered Mobile Number">

<!-- BUTTON -->

<button
class="btn-reset"
onclick="recoverPassword()">

<i class="bi bi-search"></i>
Find Password

</button>

<!-- RESULT -->

<div
class="result"
id="resultBox">

</div>

<!-- BACK -->

<div class="back">

<a href="login.html">

<i class="bi bi-arrow-left"></i>
Back To Login

</a>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 Pal Study Center
<br>
Designed With ❤️ For Modern Education

</div>

</div>

</div>

<script>

function recoverPassword(){

let phone =
document.getElementById("phone").value.trim();

let resultBox =
document.getElementById("resultBox");

/* GET USERS */

let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND USER */

let user =
users.find(u => u.phone === phone);

/* SHOW RESULT BOX */

resultBox.style.display = "block";

/* EMPTY */

if(phone === ""){

resultBox.innerHTML =
"Please Enter Mobile Number";

return;

}

/* USER FOUND */

if(user){

resultBox.innerHTML =
"Your Password is : <b>" +
user.password +
"</b>";

}

/* USER NOT FOUND */

else{

resultBox.innerHTML =
"Mobile Number Not Found";

}

}

</script>

</body>

</html>
