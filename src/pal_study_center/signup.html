<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - Pal Study Center</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#111827,
#1e293b
);

padding:40px 15px;

overflow-x:hidden;

position:relative;

}

/* BACKGROUND EFFECT */

.glow{

position:absolute;

width:300px;

height:300px;

background:rgba(59,130,246,.12);

border-radius:50%;

filter:blur(120px);

top:-80px;

left:-80px;

z-index:0;

}

.glow2{

position:absolute;

width:320px;

height:320px;

background:rgba(14,165,233,.10);

border-radius:50%;

filter:blur(120px);

bottom:-100px;

right:-100px;

z-index:0;

}

/* SIGNUP CARD */

.signup-wrapper{

max-width:500px;

margin:auto;

position:relative;

z-index:2;

}

.signup-card{

background:rgba(15,23,42,.78);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:32px;

padding:40px 30px;

box-shadow:
0 10px 35px rgba(0,0,0,.45);

color:white;

animation:fadeIn .8s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* HEADER */

.logo-box{

text-align:center;

margin-bottom:35px;

}

.logo-circle{

width:85px;

height:85px;

border-radius:50%;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

box-shadow:
0 8px 22px rgba(37,99,235,.35);

margin-bottom:18px;

}

.logo-circle i{

font-size:35px;

color:white;

}

.logo-box h1{

font-size:32px;

font-weight:700;

margin-bottom:8px;

color:#f8fafc;

}

.logo-box p{

color:#94a3b8;

font-size:15px;

}

/* FORM */

.form-label{

font-size:14px;

margin-bottom:8px;

color:#cbd5e1;

font-weight:500;

}

.form-control,
.form-select{

height:55px;

border:1px solid rgba(255,255,255,.08);

border-radius:16px;

background:#1e293b;

color:#f8fafc;

font-size:15px;

transition:.3s;

padding-left:15px;

}

.form-control::placeholder{

color:#94a3b8;

}

.form-select{

color:#cbd5e1;

}

.form-control:focus,
.form-select:focus{

background:#273449;

border-color:#3b82f6;

color:white;

box-shadow:
0 0 0 4px rgba(59,130,246,.18);

}

option{

background:#0f172a;

color:white;

}

/* BUTTON */

.signup-btn{

width:100%;

height:58px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

color:white;

font-size:17px;

font-weight:600;

margin-top:12px;

transition:.35s;

box-shadow:
0 8px 22px rgba(37,99,235,.28);

}

.signup-btn:hover{

transform:translateY(-2px);

background:
linear-gradient(
135deg,
#1d4ed8,
#1e40af
);

box-shadow:
0 10px 26px rgba(37,99,235,.35);

}

/* FOOTER */

.footer{

text-align:center;

margin-top:30px;

color:#94a3b8;

font-size:13px;

line-height:1.8;

}

/* RESPONSIVE */

@media(max-width:768px){

.signup-card{
padding:30px 22px;
}

.logo-box h1{
font-size:28px;
}

.logo-circle{
width:75px;
height:75px;
}

.logo-circle i{
font-size:30px;
}

}

</style>

</head>

<body>

<!-- BACKGROUND EFFECT -->

<div class="glow"></div>
<div class="glow2"></div>

<!-- SIGNUP SECTION -->

<div class="signup-wrapper">

<div class="signup-card">

<!-- HEADER -->

<div class="logo-box">

<div class="logo-circle">

<i class="bi bi-mortarboard-fill"></i>

</div>

<h1>पाल स्टडी सेंटर</h1>

<p>
Create Your Student Account
</p>

</div>

<!-- FORM -->

<div class="mb-4">

<label class="form-label">
Student Name
</label>

<input
id="name"
type="text"
class="form-control"
placeholder="Enter Student Name">

</div>

<div class="mb-4">

<label class="form-label">
Mobile Number
</label>

<input
id="phone"
type="number"
class="form-control"
placeholder="Enter Mobile Number">
</div>

<!-- Select Class -->

<div class="mb-4">

<label class="form-label">
Select Class
</label>
<select id="class" class="form-select">

<option>
Class 9th
</option>

<option>
Class 10th
</option>

<option>
Class 11th
</option>

<option>
Class 12th
</option>
</select>

</div>


<!-- Password -->

<div class="mb-4">

<label class="form-label">
Password
</label>

<input
id="password"
type="password"
class="form-control"
placeholder="Create Password">

</div>



<!-- BUTTON -->

<button
class="signup-btn"
onclick="signup()">

<i class="bi bi-person-plus-fill"></i>
Create Account

</button>

<!-- FOOTER -->

<div class="footer">

© 2026 Pal Study Center
<br>
Designed With ❤️ For Modern Education

</div>

</div>

</div>

<!-- OLD BACKEND SAME -->

<script src="app.js"></script>

</body>

</html>
