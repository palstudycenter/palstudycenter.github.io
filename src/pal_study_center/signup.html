
<!DOCTYPE html>
<html lang="hi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup - Pal Study Center</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;

    background:linear-gradient(
        135deg,
        #f8fbff 0%,
        #eef5ff 50%,
        #ffffff 100%
    );

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
    overflow-x:hidden;
    position:relative;
}

/* GLASS EFFECT */

.glow{
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(37,99,235,.08);
    border-radius:50%;
    filter:blur(120px);
    top:-100px;
    left:-100px;
    z-index:0;
}

.glow2{
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(59,130,246,.08);
    border-radius:50%;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
    z-index:0;
}

/* WRAPPER */

.signup-wrapper{
    width:100%;
    max-width:520px;
    position:relative;
    z-index:2;
}

/* CARD */

.signup-card{
    background:rgba(255,255,255,.78);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.9);

    border-radius:32px;

    padding:40px 30px;

    box-shadow:
    0 15px 40px rgba(15,23,42,.08);

    color:#1e293b;

    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* LOGO */

.signup-logo{
    width:100%;
    max-width:340px;
    display:block;
    margin:0 auto 20px;
}

.logo-box{
    text-align:center;
}

.logo-box p{
    color:#64748b;
    font-size:15px;
    margin-bottom:25px;
}

/* FORM */

.form-label{
    font-size:14px;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

.form-control,
.form-select{
    height:55px;
    border-radius:16px;
    background:#ffffff;
    color:#1e293b;
    border:1px solid #cbd5e1;
}

.form-control::placeholder{
    color:#64748b;
}

.form-control:focus,
.form-select:focus{
    background:#ffffff;
    color:#1e293b;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

/* BUTTON */

.signup-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );

    color:white;
    font-size:17px;
    font-weight:600;

    margin-top:12px;

    transition:.35s;

    box-shadow:
    0 8px 22px rgba(37,99,235,.28);
}

.signup-btn:hover{
    transform:translateY(-2px);

    background:linear-gradient(
        135deg,
        #1d4ed8,
        #1e40af
    );

    box-shadow:
    0 10px 26px rgba(37,99,235,.35);
}

/* STATUS */

.status-text{
    margin-top:14px;
    font-size:14px;
    color:#2563eb;
    min-height:20px;
    text-align:center;
}

/* LOGIN */

.login-link{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.login-link:hover{
    text-decoration:underline;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:25px;
    color:#64748b;
    font-size:13px;
    line-height:1.8;
}

/* MOBILE */

@media(max-width:768px){

    .signup-card{
        padding:28px 20px;
    }

    .signup-logo{
        max-width:260px;
    }

}
</style>


</head>

<body>

    <!-- BACKGROUND EFFECT -->


    <!-- SIGNUP SECTION -->

    <div class="signup-wrapper">

        <div class="signup-card">

            <!-- HEADER -->

<div class="logo-box">
        <p>Learn • Grow • Succeed</p>
    <img src="../../assets/img/main_logo.png"
         alt="Pal Study Center Logo"
         class="signup-logo">
    <p>Create Your Student Account</p>
</div>
            <!-- FORM -->

            <div class="mb-4">

                <label class="form-label">
                    Student Name
                </label>

                <input id="name" type="text" class="form-control" placeholder="Enter Student Name">

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Mobile Number
                </label>

                <input id="phone" type="number" class="form-control" placeholder="Enter Mobile Number">
            </div>

            <!-- Select Class -->

            <div class="mb-4">

                <label class="form-label">
                    Select Class
                </label>
                <select id="class" class="form-select">

                    <option>
                        Class 9th
                    </option>

                    <option>
                        Class 10th
                    </option>

                    <option>
                        Class 11th
                    </option>

                    <option>
                        Class 12th
                    </option>
                </select>

            </div>

            <!-- Select Board -->

            <div class="mb-4">

                <label class="form-label">
                    Select Board
                </label>
                <select id="board" class="form-select">

                    <option>
                        Select Board
                    </option>

                    <option>
                        MP Board (Hindi Medium)
                    </option>

                    <option>
                        MP Board (English Medium)
                    </option>

                    <option>
                        CBSE
                    </option>
                </select>

            </div>


            <!-- Password -->

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input id="password" type="password" class="form-control" placeholder="Create Password">

            </div>



            <!-- BUTTON -->

            <button class="signup-btn" onclick="signup()">

                <i class="bi bi-person-plus-fill"></i>
                Create Account

            </button>

            <div id="signupStatus" class="status-text" style="display:none;"></div>

            <div class="text-center mt-3">
                Already have an account? <a class="login-link" href="login.html">Login</a>
            </div>

    <!-- OLD BACKEND SAME -->

    <script src="../../config.js"></script>
    <script src="app.js"></script>

</body>

</html>
