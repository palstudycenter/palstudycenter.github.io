<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Pal Study Center</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
html,
body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden !important;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f8fafc;
    padding:20px;
    position:relative;
    overflow-x:hidden;
}

/* Background Glow */

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(37,99,235,.12);
    border-radius:50%;
    filter:blur(120px);
    top:-120px;
    left:-120px;
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(14,165,233,.10);
    border-radius:50%;
    filter:blur(120px);
    bottom:-120px;
    right:-120px;
}

/* Container */

.login-container{
    width:100%;
    max-width:450px;
    position:relative;
    z-index:2;
}

/* Glass Card */

.login-card{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.9);
    border-radius:30px;
    padding:40px 30px;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Logo */

.login-logo{
    width:100%;
    max-width:320px;
    display:block;
    margin:0 auto 15px;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo p{
    color:#64748b;
    font-size:15px;
    margin-top:10px;
}

/* Labels */

.form-label{
    font-size:14px;
    font-weight:600;
    color:#334155;
    margin-bottom:8px;
}

/* Inputs */

.form-control{
    height:54px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    background:#fff;
    color:#1e293b;
    padding-left:45px;
}

.form-control::placeholder{
    color:#64748b;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

/* Icons */

.input-group{
    position:relative;
}

.input-group i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
    z-index:10;
    font-size:18px;
}

/* Button */

.login-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    font-size:16px;
    font-weight:600;
    margin-top:12px;
    transition:.3s;
    box-shadow:0 8px 22px rgba(37,99,235,.25);
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 28px rgba(37,99,235,.35);
}

/* Links */

.extra-links{
    display:flex;
    justify-content:space-between;
    margin-top:18px;
}

.extra-links a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.extra-links a:hover{
    text-decoration:underline;
}

.status-text{
    margin-top:14px;
    text-align:center;
}

/* Footer */

.footer-text{
    text-align:center;
    margin-top:25px;
    color:#64748b;
    font-size:13px;
}

@media(max-width:576px){

    .login-card{
        padding:30px 22px;
    }

    .login-logo{
        max-width:260px;
    }
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-card">

<!-- LOGO -->

<div class="logo">
      <p>Learn • Grow • Succeed</p>
  <img src="../../main_logo.png"
         alt="Pal Study Center"
         class="login-logo">
</div>

<!-- FORM -->

<!-- MOBILE -->

<div class="mb-4">

<label class="form-label">
Mobile Number
</label>

<div class="input-group">

<i class="bi bi-telephone-fill"></i>

<input
id="phone"
type="tel"
class="form-control"
placeholder="Enter Mobile Number">

</div>

</div>

<!-- PASSWORD -->

<div class="mb-3">

<label class="form-label">
Password
</label>

<div class="input-group">

<i class="bi bi-lock-fill"></i>

<input
id="password"
type="password"
class="form-control"
placeholder="Enter Password">

</div>

</div>

<!-- BUTTON -->

<button
class="login-btn"
onclick="login()">

<i class="bi bi-box-arrow-in-right"></i>
Login Now

</button>

<div id="loginStatus" class="status-text" style="display:none;"></div>

<!-- LINKS -->

<div class="extra-links">

<a href="forgot_password.html">
Forgot Password?
</a>

<a href="signup.html">
Signup
</a>

</div>


<!-- OLD BACKEND JS SAME -->

<script src="../../config.js"></script>
<script src="app.js"></script>

</body>

</html>
