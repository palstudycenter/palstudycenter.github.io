<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pal ERP Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,system-ui;
background:#f5f7fb;
overflow-x:hidden;
padding-top:70px;
}

/* NAVBAR */
.navbar{
background:rgba(15,23,42,0.45);
backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,0.08);
padding:10px 0;
}

.navbar-brand{
font-size:24px;
font-weight:700;
color:white !important;
}

.navbar-brand span{
color:#60a5fa;
}

/* ================= HERO (SMALL + PROFESSIONAL) ================= */
.hero{
min-height:60vh; /* 🔥 reduced height */
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background:linear-gradient(rgba(15,23,42,0.65),rgba(15,23,42,0.65)),
url('assets/img/classroom-bg.jpg');
background-size:cover;
background-position:center;
position:relative;
}

.hero-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:22px;
border-radius:18px;
max-width:360px;
width:100%;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.brand-title{
font-size:18px;
font-weight:700;
color:#60a5fa;
margin-bottom:8px;
}

.profile-pic{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #60a5fa;
object-fit:cover;
margin:10px 0;
}

.badge{
display:inline-block;
padding:5px 12px;
background:#2563eb;
border-radius:20px;
font-size:11px;
margin-bottom:8px;
}

.tagline{
color:#cbd5e1;
font-size:13px;
}

/* ================= SUBJECT SECTION (SCALABLE GRID) ================= */
.section{
padding:40px 15px;
}

.subject-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:12px;
}

/* PROFESSIONAL COLOR SYSTEM (CONSISTENT) */
.subject{
padding:16px;
border-radius:14px;
color:white;
font-weight:600;
text-align:center;
transition:.25s;
box-shadow:0 6px 15px rgba(0,0,0,0.12);
font-size:14px;
}

.subject:hover{
transform:translateY(-5px);
}

/* NEW PROFESSIONAL COLORS */
.c1{background:linear-gradient(135deg,#2563eb,#1d4ed8);}
.c2{background:linear-gradient(135deg,#16a34a,#15803d);}
.c3{background:linear-gradient(135deg,#f59e0b,#d97706);}
.c4{background:linear-gradient(135deg,#ef4444,#dc2626);}
.c5{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.c6{background:linear-gradient(135deg,#06b6d4,#0891b2);}

/* MODAL */
.overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:9999;
}

.modalBox{
background:white;
height:100%;
padding:20px;
overflow:auto;
}

.closeBtn{
position:fixed;
top:15px;
right:15px;
background:red;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
}

.item{
padding:12px;
margin:10px 0;
border-radius:10px;
background:#f8fafc;
font-weight:600;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand">पाल <span>ERP</span></a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<i class="bi bi-list" style="color:white;font-size:26px;"></i>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li><a class="nav-link" href="#">Home</a></li>
<li><a class="nav-link" onclick="openTest()">Test</a></li>
<li><a class="nav-link" onclick="openNotice()">Notice</a></li>
<li><a class="nav-link" onclick="openFees()">Fees</a></li>
</ul>
</div>

</div>
</nav>

<!-- HERO (SMALL) -->
<section class="hero">

<div class="hero-card">

<div class="brand-title">पाल स्टडी सेंटर</div>

<div class="badge">🎓 Student Dashboard</div>

<div style="position:relative; display:flex; justify-content:center;">

  <div onclick="uploadPhoto()" 
       style="
       width:95px;
       height:95px;
       border-radius:50%;
       padding:3px;
       background:linear-gradient(135deg,#60a5fa,#8b5cf6);
       box-shadow:0 8px 20px rgba(0,0,0,0.25);
       cursor:pointer;
       transition:0.3s;
       ">

    <img id="photo"
      src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
      style="
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
        border:3px solid white;
      ">

  </div>

  <!-- small edit icon -->
  <div style="
    position:absolute;
    bottom:5px;
    right:35%;
    background:#2563eb;
    color:white;
    width:22px;
    height:22px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
  ">
    <i class="bi bi-camera"></i>
  </div>

</div>

<h5 id="name"></h5>
<p id="class"></p>

<p class="tagline">Learn • Grow • Succeed</p>

</div>

</section>

<!-- SUBJECTS -->
<section class="section">
<div class="container">

<h4>📘 Subjects</h4>

<div id="subjects" class="subject-grid"></div>

</div>
</section>

<!-- MODALS -->
<div class="overlay" id="testBox">
<div class="modalBox">
<button class="closeBtn" onclick="closeTest()">Close</button>
<h3>Test</h3>
<div id="testList"></div>
</div>
</div>

<div class="overlay" id="noticeBox">
<div class="modalBox">
<button class="closeBtn" onclick="closeNotice()">Close</button>
<h3>Notice</h3>
<div id="noticeList"></div>
</div>
</div>

<div class="overlay" id="feeBox">
<div class="modalBox">
<button class="closeBtn" onclick="closeFees()">Close</button>
<h3>Fees</h3>
<div id="feeList"></div>
</div>
</div>

<script>

/* USER */
let student = JSON.parse(localStorage.getItem("currentUser")) || {name:"Student",class:"Class 12th",phone:"0"};
let users = JSON.parse(localStorage.getItem("users")) || [];
let real = users.find(u=>u.phone===student.phone) || student;
if(real.access === false){

document.getElementById("subjects").innerHTML = `
<div class="item">
🚫 Your Access Has Been Disabled By Admin
</div>
`;

throw new Error("Blocked");

}

document.getElementById("name").innerText = real.name;
document.getElementById("class").innerText = real.class;

/* PHOTO */
function uploadPhoto(){
let input=document.createElement("input");
input.type="file";
input.onchange=(e)=>{
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=()=>{
document.getElementById("photo").src=reader.result;
localStorage.setItem("photo_"+real.phone,reader.result);
};
reader.readAsDataURL(file);
};
input.click();
}

let saved=localStorage.getItem("photo_"+real.phone);
if(saved){document.getElementById("photo").src=saved;}

/* SUBJECTS (EASILY EXPANDABLE) */
let subjects = {

"Class 12th":[
"Physics",
"Chemistry",
"Mathematics",
"Biology",
"English",
"Hindi"
],

"Class 11th":[
"Physics",
"Chemistry",
"Mathematics",
"Biology",
"English",
"Hindi"
],

"Class 10th":[
"Science",
"Social Science",
"Mathematics",
"English",
"Hindi"
],

"Class 9th":[
"Science",
"Social Science",
"Mathematics",
"English",
"Hindi"
]

};

let colors=["c1","c2","c3","c4","c5","c6"];

let enabled = JSON.parse(localStorage.getItem("enabled")) || {};

let html="";

(subjects[real.class] || []).forEach((s,i)=>{

let key = real.class + "_" + s;

if(enabled[key] === false){
return;
}

html+=`<div class="subject ${colors[i%colors.length]}">${s}</div>`;

});

document.getElementById("subjects").innerHTML=html;

/* TEST */
function openTest(){
let data=JSON.parse(localStorage.getItem("tests"))||{};
let list=data[real.class]||["No Tests"];
document.getElementById("testList").innerHTML=list.map(i=>`<div class="item">${i}</div>`).join("");
document.getElementById("testBox").style.display="block";
}
function closeTest(){document.getElementById("testBox").style.display="none";}

/* NOTICE */
function openNotice(){
let data=JSON.parse(localStorage.getItem("notices"))||{};
let list=data[real.class]||["No Notice"];
document.getElementById("noticeList").innerHTML=list.map(i=>`<div class="item">${i}</div>`).join("");
document.getElementById("noticeBox").style.display="block";
}
function closeNotice(){document.getElementById("noticeBox").style.display="none";}

/* FEES */
function openFees(){
let data=JSON.parse(localStorage.getItem("fees"))||{};
let list=data[real.phone]||{April:"Paid",May:"Paid"};
let html="";
for(let m in list){
html+=`<div class="item">${m} - ${list[m]}</div>`;
}
document.getElementById("feeList").innerHTML=html;
document.getElementById("feeBox").style.display="block";
}
function closeFees(){document.getElementById("feeBox").style.display="none";}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
