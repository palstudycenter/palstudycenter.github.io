<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>पाल स्टडी सेंटर गैलरी</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7ff;
  overflow-x:hidden;
}

/* 🌈 ANIMATED HEADER */
.header{
  height:260px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#fff;
  position:relative;
  background:linear-gradient(-45deg,#1f4db8,#6a11cb,#2575fc,#00c6ff);
  background-size:400% 400%;
  animation: gradientMove 8s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* floating circles */
.header::before,
.header::after{
  content:"";
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  animation: float 6s infinite ease-in-out;
}

.header::before{
  width:120px;
  height:120px;
  top:20px;
  left:10%;
}

.header::after{
  width:180px;
  height:180px;
  bottom:10px;
  right:10%;
  animation-delay:2s;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-25px);}
}

/* TEXT */
.header h1{
  font-size:40px;
  margin:0;
  text-shadow:0 0 15px rgba(255,255,255,0.7);
}

.header p{
  margin-top:10px;
  font-size:18px;
  opacity:0.95;
}

/* FILTER */
.filters{
  text-align:center;
  margin:15px;
}

.filters button{
  margin:5px;
  padding:8px 15px;
  border-radius:6px;
  border:1px solid #1f4db8;
  background:#fff;
  color:#1f4db8;
  cursor:pointer;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.3s;
}

.card img:hover{
  transform:scale(1.05);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img{
  max-width:90%;
  max-height:75%;
  border-radius:10px;
}

/* BUTTONS */
.btns{
  margin-top:15px;
}

button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1f4db8;
  color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>📸 पाल स्टडी सेंटर</h1>
  <p>हमारी यादें • हमारी पहचान • हमारी गैलरी</p>
</div>

<!-- FILTER -->
<div class="filters">
  <button onclick="filter('All')">All</button>
  <button onclick="filter('Classroom')">Classroom</button>
  <button onclick="filter('Events')">Events</button>
  <button onclick="filter('Other')">Other</button>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <img id="modalImg">

  <div class="btns">
    <button onclick="prev()">⬅ Prev</button>
    <button onclick="next()">Next ➡</button>
    <button onclick="zoomIn()">➕ Zoom</button>
    <button onclick="zoomOut()">➖ Zoom</button>
    <button onclick="download()">⬇ Download</button>
    <button onclick="startSlide()">▶ Slideshow</button>
    <button onclick="stopSlide()">⏸ Stop</button>
    <button onclick="closeModal()">Close ❌</button>
  </div>
</div>

<script>

let images = [
  {src:"../assets/img/gallery/1.png", cat:"Classroom"},
    {src:"../assets/img/gallery/3.png", cat:"Classroom"},
        {src:"../assets/img/gallery/4.png", cat:"Classroom"},
  {src:"https://picsum.photos/500/400?2", cat:"Events"},
  {src:"https://picsum.photos/500/400?3", cat:"Other"},
  {src:"../assets/img/gallery/2.png", cat:"Classroom"},
  {src:"https://picsum.photos/500/400?5", cat:"Events"},
  {src:"https://picsum.photos/500/400?6", cat:"Other"}
];

let current=0;
let scale=1;
let slide;

// LOAD
function load(data=images){
  let html="";
  data.forEach((img,i)=>{
    html+=`<div class="card" onclick="openImg(${i})">
      <img src="${img.src}">
    </div>`;
  });
  document.getElementById("gallery").innerHTML=html;
}
load();

// FILTER
function filter(cat){
  if(cat==="All") return load();
  load(images.filter(i=>i.cat===cat));
}

// OPEN
function openImg(i){
  current=i;
  scale=1;
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=images[i].src;
  document.getElementById("modalImg").style.transform="scale(1)";
}

// CLOSE
function closeModal(){
  document.getElementById("modal").style.display="none";
  stopSlide();
}

// NEXT
function next(){
  current=(current+1)%images.length;
  openImg(current);
}

// PREV
function prev(){
  current=(current-1+images.length)%images.length;
  openImg(current);
}

// ZOOM
function zoomIn(){
  scale+=0.2;
  document.getElementById("modalImg").style.transform=`scale(${scale})`;
}

function zoomOut(){
  scale=Math.max(0.5,scale-0.2);
  document.getElementById("modalImg").style.transform=`scale(${scale})`;
}

// DOWNLOAD
function download(){
  let a=document.createElement("a");
  a.href=images[current].src;
  a.download="pal-study-center.jpg";
  a.click();
}

// SLIDESHOW
function startSlide(){
  stopSlide();
  slide=setInterval(next,2000);
}

function stopSlide(){
  clearInterval(slide);
}

</script>

</body>
</html>
