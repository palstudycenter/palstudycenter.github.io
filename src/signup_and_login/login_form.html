<!DOCTYPE html>
<html lang="hi">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pal Study Center - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;

      min-height:100vh;

      display:flex;

      align-items:center;

      justify-content:center;

      background:
      linear-gradient(rgba(15,23,42,.78),rgba(15,23,42,.78)),
      url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1400');

      background-size:cover;

      background-position:center;

      overflow:hidden;

    }

    /* =========================
       LOGIN BOX
    ========================= */

    .login-container{

      width:100%;

      max-width:420px;

      padding:20px;

    }

    .login-card{

      background:rgba(255,255,255,0.12);

      backdrop-filter:blur(14px);

      border:1px solid rgba(255,255,255,0.18);

      border-radius:28px;

      padding:40px 30px;

      box-shadow:0 10px 40px rgba(0,0,0,.35);

      color:white;

      animation:fadeIn 1s ease;

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(25px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    .logo{

      text-align:center;

      margin-bottom:25px;

    }

    .logo h1{

      font-size:34px;

      font-weight:700;

      color:#60a5fa;

      text-shadow:0 0 8px rgba(96,165,250,.6);

    }

    .logo p{

      color:#e2e8f0;

      font-size:15px;

      margin-top:8px;

    }

    /* =========================
       FORM
    ========================= */

    .form-label{

      font-size:14px;

      font-weight:500;

      margin-bottom:8px;

      color:#f8fafc;

    }

    .form-control{

      height:52px;

      border-radius:14px;

      border:none;

      padding-left:45px;

      background:rgba(255,255,255,0.12);

      color:white;

      font-size:15px;

      transition:.3s;

    }

    .form-control::placeholder{
      color:#dbeafe;
    }

    .form-control:focus{

      background:rgba(255,255,255,0.18);

      box-shadow:0 0 0 3px rgba(96,165,250,.35);

      color:white;

    }

    .input-group{

      position:relative;

    }

    .input-group i{

      position:absolute;

      top:50%;

      left:16px;

      transform:translateY(-50%);

      color:#dbeafe;

      font-size:18px;

      z-index:10;

    }

    /* =========================
       LOGIN BUTTON
    ========================= */

    .login-btn{

      width:100%;

      height:52px;

      border:none;

      border-radius:14px;

      background:linear-gradient(135deg,#2563eb,#7c3aed);

      color:white;

      font-size:16px;

      font-weight:600;

      margin-top:12px;

      transition:.3s;

      box-shadow:0 6px 20px rgba(37,99,235,.4);

    }

    .login-btn:hover{

      transform:translateY(-3px);

      box-shadow:0 10px 24px rgba(37,99,235,.55);

    }

    /* =========================
       LINKS
    ========================= */

    .extra-links{

      display:flex;

      justify-content:space-between;

      margin-top:18px;

      font-size:14px;

    }

    .extra-links a{

      color:#dbeafe;

      text-decoration:none;

      transition:.3s;

      font-weight:500;

    }

    .extra-links a:hover{
      color:white;
    }

    /* =========================
       FOOTER
    ========================= */

    .footer-text{

      text-align:center;

      margin-top:28px;

      color:#cbd5e1;

      font-size:13px;

    }

    /* =========================
       RESPONSIVE
    ========================= */

    @media(max-width:576px){

      .login-card{
        padding:35px 22px;
      }

      .logo h1{
        font-size:28px;
      }

    }

  </style>

</head>

<body>

  <!-- =========================
       LOGIN SECTION
  ========================= -->

  <div class="login-container">

    <div class="login-card">

      <!-- LOGO -->

      <div class="logo">

        <h1>पाल स्टडी सेंटर</h1>

        <p>
          Learn • Grow • Succeed
        </p>

      </div>

      <!-- FORM -->

      <form>

        <!-- MOBILE -->

        <div class="mb-4">

          <label class="form-label">
            Mobile Number
          </label>

          <div class="input-group">

            <i class="bi bi-telephone-fill"></i>

            <input type="tel"
              class="form-control"
              id="mobile"
              placeholder="Enter Mobile Number"
              required>

          </div>

        </div>

        <!-- PASSWORD -->

        <div class="mb-3">

          <label class="form-label">
            Password
          </label>

          <div class="input-group">

            <i class="bi bi-lock-fill"></i>

            <input type="password"
              class="form-control"
              id="password"
              placeholder="Enter Password"
              required>

          </div>

        </div>

        <!-- LOGIN BUTTON -->

        <button type="button"
          class="login-btn"
          onclick="login()">

          <i class="bi bi-box-arrow-in-right"></i>
          Login Now

        </button>

        <!-- LINKS -->

        <div class="extra-links">

          <a href="forgot_password.html">
            Forgot Password?
          </a>

          <a href="../../index.html">
            ← Back
          </a>

        </div>

      </form>

      <!-- FOOTER -->

      <div class="footer-text">

        © 2026 Pal Study Center
        <br>
        Designed With ❤️ For Modern Education

      </div>

    </div>

  </div>

  <!-- =========================
       JAVASCRIPT
  ========================= -->

  <script>

    function login(){

      let mobile =
      document.getElementById("mobile").value;

      let password =
      document.getElementById("password").value;

      let savedMobile =
      localStorage.getItem("mobile");

      let savedPassword =
      localStorage.getItem("password");

      if(mobile == savedMobile &&
         password == savedPassword){

        alert("Login Successful");

        window.location.href =
        "dashboard.html";

      }

      else{

        alert("Wrong Mobile or Password");

      }

    }

  </script>

</body>

</html>
